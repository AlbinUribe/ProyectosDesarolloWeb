<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema de Inventarios</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm" style="max-width: 500px; margin: auto;">
            <div class="card-body">
                <h3 class="card-title mb-3" th:text="${producto.id} != null ? 'Editar Producto' : 'Nuevo Producto'"></h3>

                <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción (opcional)</label>
                        <input type="text" class="form-control" th:field="*{descripcion}" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select" th:field="*{categoria}" required>
                            <option value="">-- Selecciona --</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.nombre}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{precio}" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cantidad en Stock</label>
                        <input type="number" class="form-control" th:field="*{cantidadStock}" required />
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" th:field="*{activo}" />
                        <label class="form-check-label">Activo</label>
                    </div>

                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
