<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema de Inventarios</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm" style="max-width: 400px; margin: auto;">
            <div class="card-body">
                <h3 class="card-title mb-3" th:text="${categoria.id} != null ? 'Editar Categoría' : 'Nueva Categoría'"></h3>

                <form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required />
                    </div>

                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a th:href="@{/categorias}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
