<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema de Inventarios</span>
            <div>
                <a th:href="@{/productos}" class="text-white me-3 text-decoration-none">Productos</a>
                <a th:href="@{/categorias}" class="text-white text-decoration-none">Categorías</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Listado de Categorías</h2>
            <a th:href="@{/categorias/nueva}" class="btn btn-success">+ Nueva categoría</a>
        </div>

        <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
        <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <table class="table table-striped table-bordered bg-white">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="categoria : ${categorias}">
                    <td th:text="${categoria.id}"></td>
                    <td th:text="${categoria.nombre}"></td>
                    <td>
                        <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}" class="btn btn-sm btn-primary">Editar</a>
                        <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Eliminar esta categoría?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
