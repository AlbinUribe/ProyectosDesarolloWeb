<main>

<section>

<h2>

Formulario de Contacto

</h2>

<form
autocomplete="on">

<input
type="hidden"
value="cliente">


<label for="nombre">

Nombre

</label>

<input
type="text"
id="nombre"
required
placeholder="Escribe tu nombre">


<br><br>


<label for="correo">

Correo

</label>

<input
type="email"
id="correo"
required
placeholder="correo@ejemplo.com">


<br><br>


<label for="clave">

Contraseña

</label>

<input
type="password"
id="clave"
required>


<br><br>


<label for="telefono">

Teléfono

</label>

<input
type="tel"
id="telefono"
pattern="[0-9]{10}">


<br><br>


<label for="edad">

Edad

</label>

<input
type="number"
id="edad"
min="18"
max="99">


<br><br>


<label for="fecha">

Fecha

</label>

<input
type="date"
id="fecha">


<br><br>


<label for="cita">

Fecha y hora

</label>

<input
type="datetime-local"
id="cita">


<br><br>


<label for="color">

Color favorito

</label>

<input
type="color"
id="color">


<br><br>


<label for="satisfaccion">

Nivel de satisfacción

</label>

<input
type="range"
id="satisfaccion"
min="0"
max="10"
step="1">


<br><br>


<label for="archivo">

Adjuntar archivo

</label>

<input
type="file"
id="archivo"
multiple>


<br><br>


<label for="web">

Sitio web

</label>

<input
type="url"
id="web">


<br><br>


<label>

Intereses

</label>

<input
type="checkbox">
Tecnología

<input
type="checkbox">
Gaming


<br><br>


<label>

Método de contacto

</label>

<input
type="radio"
name="metodo">
Correo

<input
type="radio"
name="metodo">
Teléfono


<br><br>


<label for="ciudad">

Ciudad

</label>

<select id="ciudad">

<option>
Santo Domingo
</option>

<option>
Santiago
</option>

<option>
La Vega
</option>

</select>


<br><br>


<label for="mensaje">

Mensaje

</label>

<textarea
id="mensaje"
placeholder="Escribe aquí">

</textarea>


<br><br>


<label for="codigo">

Código cliente

</label>

<input
type="text"
id="codigo"
readonly
value="LPD-2026">


<br><br>


<label for="cupon">

Cupón

</label>

<input
type="text"
id="cupon"
disabled>


<br><br>


<button type="submit">

Enviar

</button>


<button type="reset">

Limpiar

</button>


</form>

</section>

</main>
