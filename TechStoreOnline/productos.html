<main>

<h2>

Catálogo de Productos

</h2>



<aside>
  <h3>Filtros</h3>
  <form id="form-filtros">
    <fieldset>
      <legend>Buscar Productos</legend>

      <label for="precio">Precio máximo</label>
      <input type="number" id="precio" placeholder="Precio máximo">

      <br><br>

      <label for="marca">Marca</label>
      <select id="marca">
        <option value="">Seleccione</option>
        <option value="Nova">Nova</option>
        <option value="Titan">Titan</option>
        <option value="Pulse">Pulse</option>
        <option value="Echo">Echo</option>
        <option value="Horizon">Horizon</option>
        <option value="PixelBox">PixelBox</option>
      </select>

      <br><br>

      <label for="categoria">Categoría</label>
      <input list="categorias" id="categoria">
      <datalist id="categorias">
        <option value="Laptops">
        <option value="Smartphones">
        <option value="Accesorios">
        <option value="Gaming">
        <option value="Audio">
        <option value="Tablets">
        <option value="Monitores">
      </datalist>

      <br><br>

      <label for="descuento">Porcentaje de ahorro mínimo</label>
      <input type="number" id="descuento" placeholder="Ej: 10">

      <br><br>

      <button type="submit" class="btn-rojo">Aplicar filtros</button>
    </fieldset>
  </form>
</aside>

<div id="contenedor-botones">
  <button id="btn-externos">Cargar productos externos</button>
  <button id="btn-locales">Volver a productos locales</button>
</div>
